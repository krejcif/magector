name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-cli-linux-x64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Download the pre-built binary from the release assets
      - name: Download binary from release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          curl -L "https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}/magector-core-linux-x64" \
            -o magector-core-linux-x64
          chmod +x magector-core-linux-x64
          ./magector-core-linux-x64 --version

      # Publish @magector/cli-linux-x64
      - name: Publish @magector/cli-linux-x64
        run: |
          mkdir -p /tmp/cli-linux-x64/bin
          cp magector-core-linux-x64 /tmp/cli-linux-x64/bin/magector-core

          # Read current version from npm, bump patch
          CURRENT=$(npm view @magector/cli-linux-x64 version 2>/dev/null || echo "1.2.7")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          cat > /tmp/cli-linux-x64/package.json << PKGJSON
          {
            "name": "@magector/cli-linux-x64",
            "version": "$NEW_VERSION",
            "description": "Magector Rust core binary for linux-x64",
            "os": ["linux"],
            "cpu": ["x64"],
            "files": ["bin/"],
            "license": "MIT"
          }
          PKGJSON

          cd /tmp/cli-linux-x64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish main magector package
      - name: Publish magector
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Update cli-linux-x64 dependency version
          CLI_VERSION=$(npm view @magector/cli-linux-x64 version)
          sed -i "s/\"@magector\/cli-linux-x64\": \"[^\"]*\"/\"@magector\/cli-linux-x64\": \"$CLI_VERSION\"/" package.json

          # Set version from git tag (strip 'v' prefix)
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          npm publish
